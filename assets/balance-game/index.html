                black: '#1A1A1A',

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Noto Sans KR', sans-serif;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes bounce-in {
        0% { opacity: 0; transform: scale(0.8); }
        50% { transform: scale(1.05); }
        100% { opacity: 1; transform: scale(1); }
      }
      @keyframes bounce-subtle {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      .animate-fade-in {
        animation: fade-in 0.3s ease-in;
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.5s ease-out;
      }
      .animate-bounce-in {
        animation: bounce-in 0.6s ease-out;
      }
      .animate-bounce-subtle {
        animation: bounce-subtle 2s ease-in-out infinite;
      }
    </style>
    <script>
      (() => {
        const appBaseUrl = () => new URL(window.location.href.split('#')[0], window.location.href).href;
        const rewriteJoinQr = (img) => {
          const src = img.getAttribute('src') || '';
          if (!src.includes('api.qrserver.com') || !src.includes('data=')) return;
          try {
            const url = new URL(src, window.location.href);
            const rawData = url.searchParams.get('data') || '';
            const code = new URL(rawData).hash.match(/code=([^&]+)/)?.[1];
            if (!code) return;
            const nextJoinUrl = `${appBaseUrl()}#/join?code=${code}`;
            if (rawData === nextJoinUrl) return;
            url.searchParams.set('data', nextJoinUrl);
            img.setAttribute('src', url.toString());
          } catch (error) {
            console.warn('balance game QR rewrite skipped', error);
          }
        };
        const fixAllJoinQr = () => {
          document.querySelectorAll('img[src*="api.qrserver.com"]').forEach(rewriteJoinQr);
        };
        window.addEventListener('DOMContentLoaded', () => {
          fixAllJoinQr();
          new MutationObserver(fixAllJoinQr).observe(document.body, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ['src'],
          });
        });
      })();
    </script>
